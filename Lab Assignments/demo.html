<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #161E54, #2a3570);
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }
        .parent-card{
            display: flex;
            gap:20px;   
        }
        h1 {
            text-align: center;
            color: #BBE0EF;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid #BBE0EF;
        }

        button {
            padding: 10px 20px;
            background: #F16D34;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .weather-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-left: 4px solid #F16D34;
            margin-bottom: 6px;
            background: #f9f9f9;
        }

        .console {
            background: #161E54;
            color: #BBE0EF;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 250px;
            overflow-y: auto;
        }

        .log.async {
            border-left: 3px solid #F16D34;
            padding-left: 6px;
        }

        .log.promise {
            border-left: 3px solid #FF986A;
            padding-left: 6px;
        }

        .log.callback {
            border-left: 3px solid #BBE0EF;
            padding-left: 6px;
        }

        .history button {
            margin: 5px;
            padding: 6px 14px;
            border-radius: 20px;
        }
        @media (max-width:700px){
            .parent-card{
                flex-direction: column ;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <h1>🌤 Async Weather Tracker</h1>

        <div class="parent-card">
            <div class="card">
                <h3>Search City</h3>
                <div class="input-group">
                    <input id="cityInput" placeholder="Delhi, London">
                    <button id="searchBtn">Search</button>
                </div>
                <br>
                <br>
                <h3>Search History</h3>
                <div class="history" id="history"></div>
            </div>

            <div class="card">
                <h3>Weather Info</h3>
                <div id="weather"></div>
            </div>
        </div>

        <div class="card">
            <h3>Console – Event Loop</h3>
            <div class="console" id="console"></div>
        </div>

    </div>

    <script>
        const API_KEY = "1a761d3bb408836cd1af3641ce1604c9";
        const consoleBox = document.getElementById("console");
        const weatherBox = document.getElementById("weather");
        const historyBox = document.getElementById("history");

        /* ---------- CONSOLE LOGGER ---------- */
        function log(msg, type = "async") {
            const div = document.createElement("div");
            div.className = `log ${type}`;
            div.textContent = msg;
            consoleBox.appendChild(div);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        /* ---------- EVENT LOOP DEMO ---------- */
        function eventLoopDemo() {
            log("1️⃣ Sync Start");
            setTimeout(() => log("4️⃣ setTimeout (Macrotask)", "callback"), 0);
            Promise.resolve().then(() => log("3️⃣ Promise.then (Microtask)", "promise"));
            log("2️⃣ Sync End");
        }

        /* ---------- WEATHER FETCH (ASYNC/AWAIT) ---------- */
        async function getWeather(city) {
            log("[ASYNC] Start fetching");
            await new Promise(r => setTimeout(r, 500));

            const res = await fetch(
                `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`
            );

            if (!res.ok) throw new Error("City not found");

            const data = await res.json();
            log("[ASYNC] Data received");
            return data;
        }

        /* ---------- UI ---------- */
        function renderWeather(d) {
            weatherBox.innerHTML = `
        <div class="weather-item"><label>City</label><span>${d.name}, ${d.sys.country}</span></div>
        <div class="weather-item"><label>Temp</label><span>${d.main.temp} °C</span></div>
        <div class="weather-item"><label>Weather</label><span>${d.weather[0].main}</span></div>
        <div class="weather-item"><label>Humidity</label><span>${d.main.humidity}%</span></div>
        <div class="weather-item"><label>Wind</label><span>${d.wind.speed} m/s</span></div>
    `;
        }

        /* ---------- HISTORY ---------- */
        function saveHistory(city) {
            let list = JSON.parse(localStorage.getItem("cities") || "[]");
            if (!list.includes(city)) {
                list.unshift(city);
                localStorage.setItem("cities", JSON.stringify(list.slice(0, 10)));
            }
            showHistory();
        }

        function showHistory() {
            const list = JSON.parse(localStorage.getItem("cities") || "[]");
            historyBox.innerHTML = list
                .map(c => `<button onclick="search('${c}')">${c}</button>`)
                .join("");
        }

        /* ---------- SEARCH ---------- */
        async function search(city) {
            consoleBox.innerHTML = "";
            weatherBox.innerHTML = "";
            eventLoopDemo();

            try {
                const data = await getWeather(city);
                renderWeather(data);
                saveHistory(data.name);
            } catch (e) {
                weatherBox.innerHTML = `<p style="color:red">${e.message}</p>`;
            }
        }

        document.getElementById("searchBtn").onclick = () => {
            const city = cityInput.value.trim();
            if (city) search(city);
        };

        cityInput.addEventListener("keydown", e => {
            if (e.key === "Enter") search(cityInput.value.trim());
        });

        /* INIT */
        showHistory();
    </script>
</body>

</html>
