<body>

    <script>


async function sendProducts(){
   let response = await fetch('https://dummyjson.com/products/add', {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({
    title: 'Laptop',
    brand:"ASUS",
    description:"This is Asus Laptop"
    /* other product data */
  })
})

  let data = await response.json()
  console.log(data)

}

sendProducts()
    </script>
    
</body>
